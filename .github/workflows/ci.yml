name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install server
        run: |
          cd server
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd server
          pytest --cov=oriself_server --cov-report=term

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install deps
        run: |
          cd web
          pnpm install --frozen-lockfile || pnpm install

      - name: Typecheck
        run: |
          cd web
          pnpm typecheck

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          cd web
          pnpm build
